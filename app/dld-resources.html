<!DOCTYPE html>
<html lang="en">
<head>
  <script>(function(){try{if(localStorage.getItem("ee-theme")==="light")document.documentElement.classList.add("light")}catch(e){}})();</script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EE - DLD File Library</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&family=Lora:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="theme.css" />
  <link rel="stylesheet" href="course-pages.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="auth.js" defer></script>
  <script src="course-pages.js" defer></script>
  <script src="file-preview.js" defer></script>
</head>
<body class="eceuh-shell eceuh-collapsible course-ui">
  <main class="course-page">
    <div class="page-stack">
      <section class="hero-card">
        <div class="hero-inner">
          <div class="hero-top">
            <div>
              <div class="hero-kicker">Digital Logic Design</div>
              <h1 class="hero-title">File Library</h1>
              <p class="hero-desc">Bucket-backed classwork and references for ECE 3441. Preview opens the file inline; Download saves it locally.</p>
            </div>
            <div class="hero-code">R2_SYNC</div>
          </div>
        </div>
      </section>

      <section class="section-card">
        <div class="section-inner">
          <div class="section-header">
            <div>
              <div class="section-kicker">01 // Practice Files</div>
              <h2 class="section-title">Bucket-Backed Downloads</h2>
              <p class="section-subtitle">Filter the library by file type. Every link opens the Cloudflare R2 object directly.</p>
            </div>
          </div>

          <div class="filter-row">
            <button class="filter-btn active" data-filter="all">All Files</button>
            <button class="filter-btn" data-filter="quiz">Classwork</button>
            <button class="filter-btn" data-filter="exam">Reviews</button>
            <button class="filter-btn" data-filter="reference">Reference</button>
          </div>

          <div class="file-list" id="file-list"></div>
        </div>
      </section>
    </div>
  </main>

  <script>
    const BUCKET = 'https://pub-8a57ce7900574340969d1b3eb5bcdc1e.r2.dev/dld';

    window.FILE_DATA = [
      // ── Classwork ─────────────────────────────────────────
      {
        type: 'quiz', label: 'Classwork',
        title: 'CW1', desc: 'First DLD classwork handout.', date: 'S26',
        versions: [{ label: 'PDF', url: BUCKET + '/ECE3441_SP26_CW1.pdf' }]
      },
      {
        type: 'quiz', label: 'Classwork',
        title: 'CW2', desc: 'Second classwork — Word source so it can be edited or annotated.', date: 'S26',
        versions: [{ label: 'DOCX', url: BUCKET + '/ECE3441_SP26_CW2.docx' }]
      },
      {
        type: 'quiz', label: 'Classwork',
        title: 'CW3', desc: 'Third classwork handout.', date: 'S26',
        versions: [{ label: 'PDF', url: BUCKET + '/ECE3441_SP26_CW3-1.pdf' }]
      },
      {
        type: 'exam', label: 'Review',
        title: 'CW4', desc: 'Review-style DLD material.', date: 'S26',
        versions: [{ label: 'PDF', url: BUCKET + '/ECE3441_SP26_CW4-1.pdf' }]
      },
      {
        type: 'exam', label: 'Review',
        title: 'CW5', desc: 'Second review packet.', date: 'S26',
        versions: [{ label: 'PDF', url: BUCKET + '/ECE3441_SP26_CW5.pdf' }]
      },
    ];

    document.addEventListener('DOMContentLoaded', () => {
      const buttons = Array.from(document.querySelectorAll('[data-filter]'));
      buttons.forEach((btn) => btn.addEventListener('click', () => {
        const type = btn.dataset.filter;
        document.querySelectorAll('.file-entry').forEach((entry) => {
          entry.classList.toggle('hidden', type !== 'all' && entry.dataset.type !== type);
        });
        buttons.forEach((b) => b.classList.toggle('active', b === btn));
      }));
    });
  </script>
</body>
</html>
