<!DOCTYPE html>
<html lang="en">
<head>
  <script>(function(){try{if(localStorage.getItem("ee-theme")==="light")document.documentElement.classList.add("light")}catch(e){}})();</script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EE — Homework Helper</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&family=Lora:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <!-- KaTeX -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.22/dist/katex.min.css" crossorigin="anonymous" />
  <!-- Highlight.js (dark theme for code blocks) -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.11.1/styles/github-dark.min.css" />
  <link rel="stylesheet" href="theme.css" />
  <style>
    /* ══════════════════════════════════════
       HOMEWORK HELPER — claude.ai-inspired
       ══════════════════════════════════════ */
    :root {
      --ch-bg:        var(--bg, #1A1A2E);
      --ch-surface:   rgba(255,255,255,0.035);
      --ch-border:    rgba(255,255,255,0.08);
      --ch-text:      #ECEDEE;
      --ch-soft:      #CBD5E1;
      --ch-muted:     #64748B;
      --ch-accent:    #FF6363;
      --ch-user-bg:   rgba(255,99,99,0.12);
      --ch-user-bd:   rgba(255,99,99,0.22);
      --ch-input-bg:  rgba(255,255,255,0.05);
      --ch-input-bd:  rgba(255,255,255,0.10);
      --ch-sans:      'Inter', system-ui, sans-serif;
      --ch-serif:     'Lora', Georgia, serif;
      --ch-mono:      'JetBrains Mono', monospace;
    }
    html.light {
      --ch-bg:        #f4ecea;
      --ch-surface:   rgba(255,255,255,0.65);
      --ch-border:    rgba(26,26,46,0.09);
      --ch-text:      #1A1A2E;
      --ch-soft:      #334155;
      --ch-muted:     #64748B;
      --ch-accent:    #b94a4a;
      --ch-user-bg:   rgba(185,74,74,0.09);
      --ch-user-bd:   rgba(185,74,74,0.20);
      --ch-input-bg:  rgba(255,255,255,0.85);
      --ch-input-bd:  rgba(26,26,46,0.12);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── Shell: full-height flex column ── */
    .ch-shell {
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
      background: var(--ch-bg);
    }

    /* ── Scrollable body ── */
    .ch-body {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
    }
    .ch-body::-webkit-scrollbar { width: 4px; }
    .ch-body::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.10); border-radius: 4px; }
    html.light .ch-body::-webkit-scrollbar-thumb { background: rgba(26,26,46,0.12); }

    /* ══ WELCOME SCREEN ══ */
    .ch-welcome {
      min-height: calc(100vh - 108px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 48px 24px 32px;
    }
    .ch-welcome.gone { display: none; }

    .welcome-inner {
      max-width: 660px;
      width: 100%;
      text-align: center;
    }

    /* Logo mark — matches claude.ai orange orb */
    .ch-logo {
      width: 72px; height: 72px;
      border-radius: 22px;
      background: linear-gradient(140deg, #FF6363 0%, #c93535 100%);
      display: grid; place-items: center;
      margin: 0 auto 28px;
      box-shadow: 0 16px 40px rgba(255,99,99,0.28), 0 4px 12px rgba(255,99,99,0.18);
    }
    html.light .ch-logo {
      background: linear-gradient(140deg, #b94a4a 0%, #7a1818 100%);
      box-shadow: 0 12px 28px rgba(185,74,74,0.22);
    }
    .ch-logo svg { width: 36px; height: 36px; color: #fff; }

    .ch-greeting {
      font-family: var(--ch-serif);
      font-weight: 700;
      font-size: clamp(24px, 4.5vw, 36px);
      color: var(--ch-text);
      line-height: 1.15;
      margin-bottom: 14px;
    }

    .ch-subtitle {
      font-size: 15px;
      color: var(--ch-muted);
      line-height: 1.65;
      max-width: 480px;
      margin: 0 auto 40px;
    }
    .ch-subtitle strong { color: var(--ch-accent); font-weight: 600; }

    /* Prompt cards — claude.ai 2×2 grid */
    .prompt-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      text-align: left;
    }
    .prompt-card {
      padding: 16px 18px;
      border-radius: 14px;
      background: var(--ch-surface);
      border: 1px solid var(--ch-border);
      cursor: pointer;
      text-align: left;
      transition: border-color .14s, background .14s, transform .12s;
    }
    .prompt-card:hover {
      border-color: rgba(255,99,99,0.40);
      background: rgba(255,99,99,0.06);
      transform: translateY(-2px);
    }
    html.light .prompt-card:hover {
      border-color: rgba(185,74,74,0.35);
      background: rgba(185,74,74,0.06);
    }
    .prompt-card-label {
      display: block;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      color: var(--ch-accent);
      margin-bottom: 6px;
    }
    .prompt-card-text {
      display: block;
      font-size: 13px;
      color: var(--ch-text);
      line-height: 1.5;
    }

    /* ══ MESSAGES ══ */
    .ch-msgs {
      padding: 28px 0 16px;
      max-width: 740px;
      margin: 0 auto;
      width: 100%;
      padding-left: 24px;
      padding-right: 24px;
    }
    .ch-msgs.gone { display: none; }

    .msg-row {
      display: flex;
      gap: 14px;
      margin-bottom: 28px;
      animation: msgSlide .22s ease;
    }
    @keyframes msgSlide {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .msg-row.user { flex-direction: row-reverse; }

    .msg-av {
      width: 30px; height: 30px;
      border-radius: 50%;
      flex-shrink: 0;
      display: grid; place-items: center;
      font-family: var(--ch-sans);
      font-size: 11px; font-weight: 700;
      margin-top: 2px;
    }
    .msg-row.user .msg-av {
      background: var(--ch-accent);
      color: #fff;
    }
    .msg-row.assistant .msg-av {
      background: linear-gradient(135deg, #FF6363, #a83838);
      color: #fff;
      font-size: 9px;
      letter-spacing: 0.3px;
    }

    .msg-bubble {
      max-width: 78%;
      font-size: 14px;
      line-height: 1.75;
      color: var(--ch-text);
    }
    .msg-row.user .msg-bubble {
      background: var(--ch-user-bg);
      border: 1px solid var(--ch-user-bd);
      border-radius: 16px 4px 16px 16px;
      padding: 12px 16px;
      font-size: 14px;
    }
    .msg-row.assistant .msg-bubble {
      max-width: 100%;
      padding: 0 0 0 2px;
    }

    /* ── markdown content ── */
    .md-body h1, .md-body h2, .md-body h3, .md-body h4 {
      font-family: var(--ch-serif);
      font-weight: 700;
      color: var(--ch-text);
      margin: 18px 0 8px;
      line-height: 1.3;
    }
    .md-body h1 { font-size: 20px; }
    .md-body h2 { font-size: 17px; }
    .md-body h3 { font-size: 15px; }
    .md-body h4 { font-size: 13px; }
    .md-body p { margin: 0 0 10px; }
    .md-body p:last-child { margin-bottom: 0; }
    .md-body ul, .md-body ol { margin: 6px 0 10px 22px; }
    .md-body li { margin-bottom: 4px; }
    .md-body strong { font-weight: 700; color: var(--ch-text); }
    .md-body em { font-style: italic; color: var(--ch-soft); }
    .md-body a { color: var(--ch-accent); text-decoration: underline; text-decoration-color: rgba(255,99,99,0.35); }
    .md-body code {
      font-family: var(--ch-mono);
      font-size: 12.5px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.10);
      padding: 1px 5px; border-radius: 5px;
    }
    html.light .md-body code {
      background: rgba(26,26,46,0.07);
      border-color: rgba(26,26,46,0.12);
    }
    .md-body pre {
      background: #0d1117 !important;
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 12px;
      overflow-x: auto;
      margin: 14px 0;
    }
    html.light .md-body pre {
      background: #161b22 !important;
      border-color: rgba(26,26,46,0.15);
    }
    .md-body pre code {
      background: none !important; border: none !important;
      padding: 16px 20px !important; display: block;
      font-size: 13px; line-height: 1.6;
    }
    .md-body blockquote {
      border-left: 3px solid var(--ch-accent);
      padding: 4px 0 4px 14px;
      margin: 10px 0;
      color: var(--ch-muted);
    }
    .md-body table { border-collapse: collapse; width: 100%; margin: 12px 0; font-size: 13px; }
    .md-body th, .md-body td { border: 1px solid var(--ch-border); padding: 8px 12px; text-align: left; }
    .md-body th { font-weight: 700; background: var(--ch-surface); }
    .md-body hr { border: none; border-top: 1px solid var(--ch-border); margin: 18px 0; }
    /* KaTeX block math centering */
    .md-body .katex-display { margin: 14px 0; overflow-x: auto; }
    .md-body .katex { font-size: 1.05em; }

    /* typing indicator */
    .typing-ind { display: flex; align-items: center; gap: 5px; padding: 4px 0; }
    .typing-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--ch-muted);
      animation: tdot 1.3s ease-in-out infinite;
    }
    .typing-dot:nth-child(2) { animation-delay: .18s; }
    .typing-dot:nth-child(3) { animation-delay: .36s; }
    @keyframes tdot {
      0%,80%,100% { transform: translateY(0); opacity: .35; }
      40% { transform: translateY(-6px); opacity: 1; }
    }

    /* streaming cursor */
    .s-cursor {
      display: inline-block; width: 2px; height: 14px;
      background: var(--ch-accent);
      vertical-align: text-bottom; margin-left: 1px;
      animation: cblink .75s step-end infinite;
    }
    @keyframes cblink { 0%,100%{opacity:1} 50%{opacity:0} }

    /* ══ INPUT AREA ══ */
    .ch-input-zone {
      flex-shrink: 0;
      padding: 12px 24px 20px;
      background: var(--ch-bg);
      border-top: 1px solid var(--ch-border);
    }
    .ch-input-inner {
      max-width: 740px;
      margin: 0 auto;
    }
    .ch-input-box {
      display: flex;
      align-items: flex-end;
      gap: 8px;
      padding: 12px 14px;
      border-radius: 18px;
      background: var(--ch-input-bg);
      border: 1px solid var(--ch-input-bd);
      transition: border-color .15s, box-shadow .15s;
    }
    .ch-input-box:focus-within {
      border-color: rgba(255,99,99,0.50);
      box-shadow: 0 0 0 3px rgba(255,99,99,0.10);
    }
    html.light .ch-input-box:focus-within {
      border-color: rgba(185,74,74,0.45);
      box-shadow: 0 0 0 3px rgba(185,74,74,0.10);
    }
    #ch-input {
      flex: 1;
      background: none; border: none; outline: none;
      color: var(--ch-text);
      font-family: var(--ch-sans);
      font-size: 14px; line-height: 1.6;
      resize: none; max-height: 200px;
      overflow-y: auto; padding: 0;
    }
    #ch-input::placeholder { color: var(--ch-muted); }

    .ch-send {
      width: 36px; height: 36px; border-radius: 50%;
      background: var(--ch-accent);
      border: none; cursor: pointer; flex-shrink: 0;
      display: grid; place-items: center;
      color: #fff;
      transition: filter .14s, transform .12s, opacity .14s;
    }
    .ch-send:hover:not(:disabled) { filter: brightness(1.1); transform: scale(1.06); }
    .ch-send:disabled { opacity: 0.30; cursor: not-allowed; }
    .ch-send svg { width: 16px; height: 16px; }

    .ch-input-meta {
      display: flex; align-items: center; justify-content: center;
      gap: 8px; margin-top: 9px;
      font-size: 11px; color: var(--ch-muted);
    }
    .ch-model-tag {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 2px 9px; border-radius: 9999px;
      background: rgba(255,99,99,0.09);
      color: var(--ch-accent);
      border: 1px solid rgba(255,99,99,0.18);
      font-size: 10px; font-weight: 700; letter-spacing: 0.5px;
    }

    /* error state inside bubble */
    .ch-error {
      padding: 12px 16px;
      border-radius: 10px;
      background: rgba(255,99,99,0.08);
      border: 1px solid rgba(255,99,99,0.20);
      font-size: 13px;
      color: var(--ch-accent);
      line-height: 1.6;
    }

    /* ── Responsive ── */
    @media (max-width: 640px) {
      .prompt-grid { grid-template-columns: 1fr; }
      .msg-bubble { max-width: 92%; }
      .ch-msgs, .ch-input-zone { padding-left: 16px; padding-right: 16px; }
    }
  </style>
</head>

<!-- CDN Libraries -->
<script src="https://cdn.jsdelivr.net/npm/marked@14.1.3/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/highlight.js@11.11.1/lib/highlight.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.22/dist/katex.min.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.22/dist/contrib/auto-render.min.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="auth.js" defer></script>

<script>
/* ════════════════════════════════════════════
   HOMEWORK HELPER — chat logic
   ════════════════════════════════════════════ */

// ── Suggested prompts ─────────────────────────────────────────────────
const PROMPTS = [
  {
    course: 'ECE 2202',
    label: 'Phasors & Impedance',
    text: 'Explain how phasors represent sinusoidal signals and how impedance generalizes Ohm\'s law for AC circuits. Walk me through a series RLC example with R=10Ω, L=0.1H, C=100μF at ω=1000 rad/s.',
  },
  {
    course: 'ECE 3441',
    label: 'K-Map Minimization',
    text: 'Minimize the Boolean function f(A,B,C,D) = Σm(0,1,3,5,7,8,9,11) using a 4-variable Karnaugh map. Show each grouping and write the simplified SOP expression.',
  },
  {
    course: 'ECE 3331',
    label: 'Pointers in C',
    text: 'Explain pointer arithmetic in C: how pointer addition relates to the element size, the equivalence of *(p+i) and p[i], and one common bug to watch for when passing arrays to functions.',
  },
  {
    course: 'ECE 3441',
    label: 'Mealy FSM Design',
    text: 'Design a Mealy finite state machine that detects the sequence "1011" in a serial binary input stream (overlapping). Provide the state diagram, state transition table, next-state and output logic.',
  },
];

// ── Markdown + code highlighting setup ───────────────────────────────
function setupMarked() {
  marked.use({
    gfm: true,
    breaks: true,
    renderer: {
      code({ text, lang }) {
        const language = lang && hljs.getLanguage(lang) ? lang : 'plaintext';
        try {
          const highlighted = hljs.highlight(text, { language }).value;
          return `<pre><code class="hljs language-${language}">${highlighted}</code></pre>`;
        } catch {
          return `<pre><code class="hljs">${text}</code></pre>`;
        }
      },
    },
  });
}

function renderMD(raw) {
  const html = marked.parse(raw);
  const div = document.createElement('div');
  div.className = 'md-body';
  div.innerHTML = html;
  // Render math with KaTeX autorender
  renderMathInElement(div, {
    delimiters: [
      { left: '$$', right: '$$', display: true },
      { left: '$',  right: '$',  display: false },
      { left: '\\[', right: '\\]', display: true },
      { left: '\\(', right: '\\)', display: false },
    ],
    throwOnError: false,
  });
  return div;
}

// ── State ─────────────────────────────────────────────────────────────
const history = [];   // { role: 'user'|'assistant', content: string }[]
let busy = false;
let userInitials = 'ME';

// ── DOM refs ──────────────────────────────────────────────────────────
const bodyEl    = document.getElementById('ch-body');
const welcomeEl = document.getElementById('ch-welcome');
const msgsEl    = document.getElementById('ch-msgs');
const inputEl   = document.getElementById('ch-input');
const sendEl    = document.getElementById('ch-send');

// ── Prompt grid ───────────────────────────────────────────────────────
function buildGrid() {
  const grid = document.getElementById('prompt-grid');
  grid.innerHTML = PROMPTS.map((p, i) => `
    <button class="prompt-card" data-i="${i}">
      <span class="prompt-card-label">${p.course} · ${p.label}</span>
      <span class="prompt-card-text">${p.text.length > 90 ? p.text.slice(0, 87) + '…' : p.text}</span>
    </button>
  `).join('');
  grid.querySelectorAll('.prompt-card').forEach(btn => {
    btn.addEventListener('click', () => {
      inputEl.value = PROMPTS[+btn.dataset.i].text;
      autoResize();
      updateSend();
      submitMessage();
    });
  });
}

// ── Helpers ───────────────────────────────────────────────────────────
function showChat() {
  welcomeEl.classList.add('gone');
  msgsEl.classList.remove('gone');
}

function autoResize() {
  inputEl.style.height = 'auto';
  inputEl.style.height = Math.min(inputEl.scrollHeight, 200) + 'px';
}

function updateSend() {
  sendEl.disabled = busy || inputEl.value.trim().length === 0;
}

function scrollBottom() {
  requestAnimationFrame(() => { bodyEl.scrollTop = bodyEl.scrollHeight; });
}

// ── Append a message row ──────────────────────────────────────────────
function appendRow(role, content) {
  const row = document.createElement('div');
  row.className = `msg-row ${role}`;

  const av = document.createElement('div');
  av.className = 'msg-av';
  av.textContent = role === 'user' ? userInitials : 'AI';

  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';

  if (content === null) {
    // typing indicator placeholder for assistant
    bubble.innerHTML = '<div class="typing-ind"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>';
  } else if (role === 'assistant') {
    bubble.appendChild(renderMD(content));
  } else {
    // user: plain text
    const span = document.createElement('span');
    span.textContent = content;
    bubble.appendChild(span);
  }

  row.appendChild(av);
  row.appendChild(bubble);
  msgsEl.appendChild(row);
  scrollBottom();
  return bubble;
}

// ── Live-update a streaming bubble ────────────────────────────────────
function patchBubble(bubble, text, done) {
  bubble.innerHTML = '';
  if (done) {
    bubble.appendChild(renderMD(text));
  } else {
    const wrap = document.createElement('div');
    wrap.className = 'md-body';
    wrap.textContent = text;
    const cur = document.createElement('span');
    cur.className = 's-cursor';
    wrap.appendChild(cur);
    bubble.appendChild(wrap);
  }
  scrollBottom();
}

// ── Stream from /api/chat ─────────────────────────────────────────────
async function streamResponse() {
  busy = true;
  updateSend();
  const bubble = appendRow('assistant', null);

  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages: history }),
    });

    if (!res.ok) {
      const msg = await res.text();
      bubble.innerHTML = `<div class="ch-error">⚠ Error ${res.status}: ${msg}</div>`;
      return;
    }

    const reader = res.body.getReader();
    const dec = new TextDecoder();
    let buf = '';
    let accumulated = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += dec.decode(value, { stream: true });

      let nl;
      while ((nl = buf.indexOf('\n')) >= 0) {
        const line = buf.slice(0, nl).trim();
        buf = buf.slice(nl + 1);
        if (!line.startsWith('data:')) continue;
        const raw = line.slice(5).trim();
        if (!raw || raw === '[DONE]') continue;
        let ev;
        try { ev = JSON.parse(raw); } catch { continue; }
        if (ev.type === 'content_block_delta' && ev.delta?.type === 'text_delta') {
          accumulated += ev.delta.text;
          patchBubble(bubble, accumulated, false);
        }
      }
    }

    // Final render with full markdown + math
    patchBubble(bubble, accumulated, true);
    history.push({ role: 'assistant', content: accumulated });

  } catch (err) {
    bubble.innerHTML = `<div class="ch-error">⚠ Network error: ${err.message}.<br>Make sure <code>ANTHROPIC_API_KEY</code> is set in your Vercel environment variables.</div>`;
  } finally {
    busy = false;
    updateSend();
  }
}

// ── Submit ────────────────────────────────────────────────────────────
function submitMessage() {
  const text = inputEl.value.trim();
  if (!text || busy) return;

  showChat();
  history.push({ role: 'user', content: text });
  appendRow('user', text);

  inputEl.value = '';
  inputEl.style.height = 'auto';
  updateSend();

  streamResponse();
}

// ── Event listeners ───────────────────────────────────────────────────
inputEl.addEventListener('input', () => { autoResize(); updateSend(); });
inputEl.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); if (!sendEl.disabled) submitMessage(); }
});
sendEl.addEventListener('click', () => { if (!sendEl.disabled) submitMessage(); });

// ── Init ──────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  setupMarked();
  buildGrid();
  updateSend();
});
</script>
</body>
</html>
